<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Videos — dawgndream</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { background: 'hsl(0 0% 0%)', foreground: 'hsl(0 0% 100%)', primary: 'hsl(0 0% 100%)', 'primary-foreground': 'hsl(0 0% 0%)', border: 'hsl(0 0% 18%)' } } } }
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-background text-foreground antialiased min-h-screen">

  <div class="pt-24 pb-12 px-6 md:px-10 max-w-7xl mx-auto">
    <div class="mb-12">
      <h1 class="text-4xl md:text-6xl font-bold uppercase tracking-widest mb-4">Visuals</h1>
      <p class="text-text-soft">Music videos, live sessions, and behind-the-scenes documentaries.</p>
    </div>

    <!-- Video Grid -->
    <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <!-- Injected by script -->
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('video-grid');
      let html = '';
      videos.forEach(v => {
        html += `
          <div class="group cursor-pointer">
            <div class="aspect-video overflow-hidden rounded-lg mb-4 bg-muted relative">
              <img src="\${v.image}" alt="\${v.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 opacity-80 group-hover:opacity-100" />
              <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-16 h-16 rounded-full bg-background/50 backdrop-blur-md flex items-center justify-center border border-white/10 group-hover:scale-110 transition-transform">
                  <div class="w-0 h-0 border-y-[8px] border-y-transparent border-l-[14px] border-l-white ml-2"></div>
                </div>
              </div>
              <div class="absolute bottom-3 right-3 bg-black/80 backdrop-blur-md px-2 py-1 rounded text-xs font-mono text-white/90">
                \${v.duration}
              </div>
            </div>
            <h3 class="text-xl font-bold uppercase tracking-wide mb-1">\${v.title}</h3>
            <p class="text-sm text-text-soft">\${v.type} • \${v.date}</p>
          </div>
        `;
      });
      grid.innerHTML = html;
    });
  </script>
</body>
</html>
