<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merch — dawgndream</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { background: 'hsl(0 0% 0%)', foreground: 'hsl(0 0% 100%)', primary: 'hsl(0 0% 100%)', 'primary-foreground': 'hsl(0 0% 0%)', border: 'hsl(0 0% 18%)' } } } }
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-background text-foreground antialiased min-h-screen">

  <div class="pt-24 pb-12 px-6 md:px-10 max-w-7xl mx-auto">
    <div class="mb-12">
      <h1 class="text-4xl md:text-6xl font-bold uppercase tracking-widest mb-4">Store</h1>
      <p class="text-text-soft">Official merchandise, physical releases, and exclusive items.</p>
    </div>

    <!-- Merch Grid -->
    <div id="merch-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Injected by script -->
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    function renderMerchGrid() {
      const grid = document.getElementById('merch-grid');
      if (!grid) return;
      
      let html = '';
      if (typeof products !== 'undefined' && Array.isArray(products)) {
        products.forEach(p => {
          html += `
            <div class="group cursor-pointer">
              <div class="aspect-square overflow-hidden rounded-lg mb-4 bg-muted relative">
                <img src="${p.image}" alt="${p.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
              </div>
              <div class="flex justify-between items-start mb-1 gap-4">
                <h3 class="text-lg font-bold uppercase tracking-wider line-clamp-2">${p.title}</h3>
                <span class="text-lg text-text-soft whitespace-nowrap">${p.price}</span>
              </div>
              <p class="text-sm text-text-dim mb-4">${p.category}</p>
              <button class="w-full py-3 border border-border text-xs uppercase tracking-widest font-semibold hover:bg-foreground hover:text-background transition-colors">
                Add to Cart
              </button>
            </div>
          `;
        });
      } else {
        html = '<p class="col-span-3 text-center text-text-soft">Falha ao carregar os produtos.</p>';
      }
      grid.innerHTML = html;
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', renderMerchGrid);
    } else {
      renderMerchGrid();
    }
  </script>
</body>
</html>
